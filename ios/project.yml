# XcodeGen spec — generates Barry.xcodeproj from the Swift sources.
#
#   brew install xcodegen
#   cd ios && xcodegen generate && open Barry.xcodeproj
#
# This produces three targets: the iOS app, the watchOS app, and the watch
# complication (WidgetKit extension embedded in the watch app). The Shared/ folder
# is compiled into every target. Set your real Team / bundle id prefix in Xcode's
# Signing & Capabilities before building to a device; the App Group capability is
# pre-declared via the entitlements files.

name: Barry
options:
  bundleIdPrefix: me.wvr
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "46RX35CZGW"

targets:
  # ---- iOS app -------------------------------------------------------------
  Barry:
    type: application
    platform: iOS
    sources:
      - Barry/iOSApp
      - Barry/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.wvr.barry
        INFOPLIST_FILE: Barry/iOSApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Barry/iOSApp/Barry.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: BarryWatch
      - sdk: CoreMotion.framework

  # ---- iOS unit tests ------------------------------------------------------
  BarryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Barry/iOSAppTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.wvr.barry.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Barry

  # ---- watchOS app ---------------------------------------------------------
  BarryWatch:
    type: application
    platform: watchOS
    sources:
      - Barry/WatchApp
      - Barry/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.wvr.barry.watchkitapp
        INFOPLIST_FILE: Barry/WatchApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Barry/WatchApp/BarryWatch.entitlements
        GENERATE_INFOPLIST_FILE: NO
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
    dependencies:
      - target: BarryComplication

  # ---- watch complication (WidgetKit extension) ----------------------------
  BarryComplication:
    type: app-extension
    platform: watchOS
    sources:
      - Barry/WatchComplication
      - Barry/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.wvr.barry.watchkitapp.BarryWidget
        INFOPLIST_FILE: Barry/WatchComplication/Info.plist
        CODE_SIGN_ENTITLEMENTS: Barry/WatchComplication/BarryComplication.entitlements
        GENERATE_INFOPLIST_FILE: NO
